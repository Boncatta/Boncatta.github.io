<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>暴塔 - Boncatta</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/boncatta.css">
</head>
<body class="mobile-app page-game">
  <main class="app-screen battle-screen">
    <section class="game-top">
      <div>
        <span class="game-kicker" id="gameStatus">等待登录</span>
        <h1>暴塔</h1>
      </div>
      <button class="mini-button" id="gameRefresh" type="button">同步</button>
    </section>

    <section class="glass-panel login-required" id="gameLoginGate" hidden>
      <div class="panel-title"><span>需要登录</span><small>先进入主页完成账号验证</small></div>
      <a class="primary-cta" href="index.html">&#21435;&#30331;&#24405;</a>
    </section>

    <section class="create-stage" id="createStage">
      <div class="mode-strip" id="modeStrip"></div>
      <section class="glass-panel role-editor">
        <div class="panel-title"><span>出战角色</span><small id="roleHint">选择你的角色</small></div>
        <div class="role-grid" id="roleEditor"></div>
      </section>
      <section class="glass-panel room-actions">
        <button class="primary-cta" id="createRoom" type="button">创建房间</button>
        <div class="join-row">
          <input id="joinCode" maxlength="8" placeholder="房间码">
          <button class="ghost-cta" id="joinRoom" type="button">加入</button>
        </div>
      </section>
    </section>

    <section class="room-stage" id="roomStage" hidden>
      <section class="room-banner">
        <div>
          <span class="game-kicker" id="roomMode">房间</span>
          <h2 id="roomCode">-----</h2>
        </div>
        <span class="status-chip" id="roomState">等待中</span>
      </section>

      <section class="seat-board" id="seatBoard"></section>

      <section class="glass-panel room-command">
        <button class="primary-cta" id="startBattle" type="button">开始战斗</button>
        <button class="ghost-cta" id="addAi" type="button">&#28155;&#21152;AI</button>
        <button class="primary-cta" id="actAi" type="button" hidden>AI&#34892;&#21160;</button>
        <button class="ghost-cta" id="leaveRoom" type="button">&#36864;&#20986;&#25151;&#38388;</button>
        <button class="ghost-cta" id="backLobby" type="button">&#36820;&#22238;&#22823;&#21381;</button>
        <button class="ghost-cta" id="resetBattle" type="button">重开</button>
      </section>

      <section class="battle-board" id="battleBoard" hidden>
        <div class="turn-card">
          <span class="game-kicker" id="roundText">第 1 回合</span>
          <strong id="turnText">等待行动</strong>
          <small id="rollText">随机数：等待首次行动</small>
        </div>
        <div class="fighter-board" id="fighterBoard"></div>
        <section class="glass-panel action-pad">
          <div class="target-mode-row">
            <button class="mini-button active" id="targetStepMode" type="button">&#36880;&#27425;&#28857;&#36873;</button>
            <button class="mini-button" id="targetMultiMode" type="button">&#19968;&#27425;&#22810;&#36873;</button>
          </div>
          <p class="target-hint" id="targetHint">&#28857;&#20987;&#35282;&#33394;&#21345;&#36873;&#25321;&#30446;&#26631;</p>
          <button class="primary-cta" id="actButton" type="button">行动</button>
        </section>
        <details class="glass-panel battle-log">
          <summary>战斗日志 <span id="logCount">0</span></summary>
          <div id="battleLog"></div>
        </details>
      </section>
    </section>
  </main>

  <nav class="nav" id="nav" aria-label="应用导航"></nav>
  <script src="/assets/baota-config.js"></script>
  <script src="/assets/common.js"></script>
  <script src="/assets/baota-api.js"></script>
  <script src="/assets/baota-mobile.js"></script>
</body>
</html>
