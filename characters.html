<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>人物图鉴 - Boncatta</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/boncatta.css">
</head>
<body class="mobile-app page-characters">
  <main class="app-screen">
    <section class="game-top">
      <div>
        <span class="game-kicker">Codex</span>
        <h1>图鉴</h1>
      </div>
    </section>
    <section class="toolbar two character-toolbar">
      <input id="characterSearch" placeholder="搜索角色或技能">
      <select id="characterSort" aria-label="排序">
        <option value="default">默认顺序</option>
        <option value="skills">技能数量</option>
        <option value="burst">最高单项概率</option>
      </select>
    </section>
    <section class="character-grid" id="characterGrid"></section>
  </main>

  <nav class="nav" id="nav" aria-label="应用导航"></nav>
  <script src="/assets/common.js"></script>
  <script src="/assets/fighting.js"></script>
  <script src="/assets/characters.js"></script>
</body>
</html>
