<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>人物图鉴 - Boncatta</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/boncatta.css">
</head>
<body>
  <header>
    <div class="topline">
      <div>
        <h1>人物图鉴</h1>
        <p class="lead">查看每个角色的技能池、概率、命中区间和效果。这里的数据与游戏页共用同一份角色定义。</p>
        <div class="credit">created by piglin</div>
      </div>
      <div class="card" style="min-width:220px">
        <span class="card-label">当前北京时间</span>
        <span class="card-value" id="nowBeijing">--</span>
      </div>
    </div>
    <nav class="nav" id="nav" aria-label="站点导航"></nav>
  </header>

  <main>
    <section class="toolbar two character-toolbar">
      <input id="characterSearch" placeholder="搜索角色或技能">
      <select id="characterSort" aria-label="排序">
        <option value="default">默认顺序</option>
        <option value="skills">技能数量</option>
        <option value="burst">最高单项概率</option>
      </select>
    </section>
    <section class="character-grid" id="characterGrid"></section>
  </main>

  <script src="/assets/common.js"></script>
  <script src="/assets/fighting.js"></script>
  <script src="/assets/characters.js"></script>
</body>
</html>
