<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Boncatta</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/boncatta.css">
</head>
<body class="mobile-app page-home">
  <main class="app-screen">
    <section class="game-hero">
      <div>
        <span class="game-kicker">Boncatta Online</span>
        <h1>暴塔</h1>
        <p>移动端真人对战大厅。</p>
      </div>
      <div class="hero-orb">BT</div>
    </section>

    <section class="glass-panel auth-card" id="homeLogin">
      <div class="panel-title">
        <span>账号登录</span>
        <small>用户名唯一，密码六位以上数字</small>
      </div>
      <label class="game-input">用户名<input id="loginName" autocomplete="username" maxlength="18" placeholder="piglin"></label>
      <label class="game-input">密码<input id="loginPassword" type="password" inputmode="numeric" autocomplete="current-password" placeholder="123456"></label>
      <button class="primary-cta" id="loginButton" type="button">进入大厅</button>
      <div class="hint-line" id="loginMessage">首次登录会在后端创建账号。</div>
    </section>

    <section class="glass-panel lobby-card" id="homeLobby" hidden>
      <div class="panel-title">
        <span id="homeGreeting">大厅</span>
        <div class="panel-actions">
          <a class="mini-button primary-mini" href="game.html">创建</a>
          <button class="mini-button" id="refreshLobby" type="button">刷新</button>
        </div>
      </div>
      <div class="room-list mobile-room-list" id="homeRoomList"></div>
    </section>
  </main>

  <nav class="nav" id="nav" aria-label="应用导航"></nav>
  <script src="/assets/baota-config.js"></script>
  <script src="/assets/common.js"></script>
  <script src="/assets/baota-api.js"></script>
  <script src="/assets/baota-mobile.js"></script>
</body>
</html>
